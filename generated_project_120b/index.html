<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SimpleCalculator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="calculator" class="calculator">
    <input type="text" id="display" class="display" readonly aria-label="Calculator display">
    <div class="buttons grid">
      <!-- Digits -->
      <button type="button" class="btn" data-action="digit" data-value="7" aria-label="Digit 7">7</button>
      <button type="button" class="btn" data-action="digit" data-value="8" aria-label="Digit 8">8</button>
      <button type="button" class="btn" data-action="digit" data-value="9" aria-label="Digit 9">9</button>
      <button type="button" class="btn" data-action="operator" data-value="/" aria-label="Operator divide">÷</button>

      <button type="button" class="btn" data-action="digit" data-value="4" aria-label="Digit 4">4</button>
      <button type="button" class="btn" data-action="digit" data-value="5" aria-label="Digit 5">5</button>
      <button type="button" class="btn" data-action="digit" data-value="6" aria-label="Digit 6">6</button>
      <button type="button" class="btn" data-action="operator" data-value="*" aria-label="Operator multiply">×</button>

      <button type="button" class="btn" data-action="digit" data-value="1" aria-label="Digit 1">1</button>
      <button type="button" class="btn" data-action="digit" data-value="2" aria-label="Digit 2">2</button>
      <button type="button" class="btn" data-action="digit" data-value="3" aria-label="Digit 3">3</button>
      <button type="button" class="btn" data-action="operator" data-value="-" aria-label="Operator minus">−</button>

      <button type="button" class="btn" data-action="digit" data-value="0" aria-label="Digit 0">0</button>
      <button type="button" class="btn" data-action="digit" data-value="." aria-label="Decimal point">.</button>
      <button type="button" class="btn" data-action="equals" aria-label="Equals">=</button>
      <button type="button" class="btn" data-action="operator" data-value="+" aria-label="Operator plus">+</button>

      <!-- Clear and Reset -->
      <button type="button" class="btn" data-action="clear" aria-label="Clear entry">CE</button>
      <button type="button" class="btn" data-action="reset" aria-label="Reset calculator">C</button>
    </div>
  </div>
  <script src="script.js" defer></script>
</body>
</html>
