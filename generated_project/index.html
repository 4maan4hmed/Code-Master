<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div id="calculator">
        <!-- Display area -->
        <div id="display" class="display" aria-live="polite"></div>

        <!-- Buttons grid -->
        <div class="buttons">
            <!-- Row 1 -->
            <button class="button clear" id="clear" data-action="clear" aria-label="Clear">C</button>
            <button class="button operator" id="divide" data-value="/" aria-label="Divide">÷</button>
            <button class="button operator" id="multiply" data-value="*" aria-label="Multiply">×</button>
            <button class="button operator" id="subtract" data-value="-" aria-label="Subtract">−</button>

            <!-- Row 2 -->
            <button class="button" id="seven" data-value="7">7</button>
            <button class="button" id="eight" data-value="8">8</button>
            <button class="button" id="nine" data-value="9">9</button>
            <button class="button operator" id="add" data-value="+" aria-label="Add">+</button>

            <!-- Row 3 -->
            <button class="button" id="four" data-value="4">4</button>
            <button class="button" id="five" data-value="5">5</button>
            <button class="button" id="six" data-value="6">6</button>
            <button class="button equals" id="equals" data-action="equals" aria-label="Equals">=</button>

            <!-- Row 4 -->
            <button class="button" id="one" data-value="1">1</button>
            <button class="button" id="two" data-value="2">2</button>
            <button class="button" id="three" data-value="3">3</button>
            <button class="button" id="zero" data-value="0">0</button>

            <!-- Row 5 (optional decimal) -->
            <button class="button" id="decimal" data-value=".">.</button>
        </div>
    </div>
</body>
</html>
